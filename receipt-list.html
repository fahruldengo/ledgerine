<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daftar Kwitansi · Ledgerine</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<script src="js/config.js"></script>
<script src="js/core.js"></script>
<script src="js/doclist.js"></script>
<script>
docListPage({
  active:'receipts.html', sheet:'Receipts',
  title:'Daftar Kwitansi', subtitle:'Kwitansi tersimpan di Google Sheets',
  newLabel:'Kwitansi Baru', editorPage:'receipts.html', editKey:'ledgerine_edit_receipt',
  columns:[
    {key:'nomor',label:'Nomor'},
    {key:'sudahTerima',label:'Diterima dari'},
    {label:'Tanggal',render:r=>Fmt.date(r.tanggal)},
    {label:'Untuk',render:r=>esc((r.untukPembayaran||'').slice(0,32))},
    {label:'Jumlah',right:true,render:r=>Fmt.currency(r.jumlah,r.mataUang)}
  ]
});
</script>
</body>
</html>
