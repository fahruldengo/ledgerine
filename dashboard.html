<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard · Ledgerine</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/app.css">
<style>
  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
  .stat .lbl{font-size:12px;color:var(--muted);margin-bottom:8px}
  .stat .val{font-size:26px;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .stat .val.sm{font-size:20px}
  .qa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  .qa{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:18px 20px;cursor:pointer;transition:border-color var(--t),box-shadow var(--t),transform var(--t)}
  .qa:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-1px)}
  .qa .ic{width:42px;height:42px;border-radius:10px;background:#EEF2F7;color:var(--accent);display:grid;place-items:center;flex-shrink:0}
  .qa .t{font-weight:600}.qa .d{font-size:12.5px;color:var(--muted)}
  @media(max-width:900px){.stat-grid{grid-template-columns:1fr 1fr}.qa-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<script src="js/config.js"></script>
<script src="js/core.js"></script>
<script>
(function(){
  const L=buildLayout('dashboard.html'); if(!L) return;
  const content=L.content, u=L.user;
  content.innerHTML=`
    <div class="page-head"><div>
      <h1>Halo, ${esc((u.nama||u.username).split(' ')[0])} 👋</h1>
      <div class="sub">Ringkasan aktivitas invoice & kwitansi</div>
    </div></div>
    <div class="stat-grid" id="stats">
      ${[0,1,2,3].map(()=>`<div class="stat"><div class="lbl">—</div><div class="val"><span class="spinner dark"></span></div></div>`).join('')}
    </div>
    <h2 style="margin:6px 0 14px">Aksi Cepat</h2>
    <div class="qa-grid">
      <div class="qa" data-go="invoices.html"><div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6"/></svg></div>
        <div><div class="t">Buat Invoice</div><div class="d">Invoice baru dengan pratinjau langsung</div></div></div>
      <div class="qa" data-go="receipts.html"><div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2"/></svg></div>
        <div><div class="t">Buat Kwitansi</div><div class="d">Bukti penerimaan pembayaran</div></div></div>
      <div class="qa" data-go="customers.html"><div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8"/></svg></div>
        <div><div class="t">Kelola Pelanggan</div><div class="d">Data untuk auto-isi dokumen</div></div></div>
      <div class="qa" data-go="products.html"><div class="ic"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7"/></svg></div>
        <div><div class="t">Kelola Barang</div><div class="d">Master data barang & jasa</div></div></div>
    </div>`;
  content.querySelectorAll('[data-go]').forEach(el=>el.onclick=()=>location.href=el.dataset.go);

  async function loadStats(){
    try{
      const [inv,kw,cust]=await Promise.all([API.list('Invoices'),API.list('Receipts'),API.list('Customers')]);
      const invoices=(inv.rows||[]).filter(x=>x.id);
      const receipts=(kw.rows||[]).filter(x=>x.id);
      const customers=(cust.rows||[]).filter(x=>x.id);
      const unpaid=invoices.filter(i=>i.status!=='PAID').reduce((s,i)=>s+(Number(i.total)||0),0);
      const stats=[
        ['Total Invoice', invoices.length, false],
        ['Total Kwitansi', receipts.length, false],
        ['Pelanggan', customers.length, false],
        ['Piutang (Belum Bayar)', Fmt.currency(unpaid), true]
      ];
      content.querySelector('#stats').innerHTML=stats.map(([l,v,sm])=>
        `<div class="stat"><div class="lbl">${l}</div><div class="val ${sm?'sm':''}">${v}</div></div>`).join('');
    }catch(e){
      content.querySelector('#stats').innerHTML=`<div class="stat" style="grid-column:1/-1;color:var(--red)">${esc(e.message)}</div>`;
    }
  }
  loadStats();
})();
</script>
</body>
</html>
